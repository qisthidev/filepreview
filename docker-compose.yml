version: '3.8'

services:
  filepreview:
    build: .
    ports:
      - "8080:8080"
    environment:
      - GIN_MODE=release
      - PORT=8080
    volumes:
      - ./uploads:/app/uploads
      - ./thumbnails:/app/thumbnails
      - /tmp:/tmp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - filepreview-network

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./uploads:/var/www/uploads:ro
      - ./thumbnails:/var/www/thumbnails:ro
    depends_on:
      - filepreview
    restart: unless-stopped
    networks:
      - filepreview-network
    profiles:
      - production

  # Optional: Redis for caching (if needed for future enhancements)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - filepreview-network
    profiles:
      - cache

networks:
  filepreview-network:
    driver: bridge

volumes:
  redis_data: