version: '3.8'

services:
  filepreview-rust:
    build: .
    ports:
      - "3000:3000"
    environment:
      - RUST_LOG=filepreview_rust=debug,tower_http=debug
    volumes:
      - ./data:/tmp/previews
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Redis for production job storage
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data: