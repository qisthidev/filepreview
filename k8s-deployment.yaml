apiVersion: apps/v1
kind: Deployment
metadata:
  name: filepreview-rust
  labels:
    app: filepreview-rust
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: filepreview-rust
  template:
    metadata:
      labels:
        app: filepreview-rust
        version: v1
    spec:
      containers:
      - name: filepreview-rust
        image: filepreview-rust:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: RUST_LOG
          value: "filepreview_rust=info,tower_http=info"
        - name: PORT
          value: "3000"
        - name: BIND_ADDRESS
          value: "0.0.0.0"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        # Security context
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        # Volume mounts for temporary files
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: cache-volume
          mountPath: /app/cache
      volumes:
      - name: tmp-volume
        emptyDir:
          sizeLimit: 1Gi
      - name: cache-volume
        emptyDir:
          sizeLimit: 500Mi
      # Node selector for better performance
      nodeSelector:
        kubernetes.io/arch: amd64
      # Pod anti-affinity to spread across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - filepreview-rust
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: filepreview-rust-service
  labels:
    app: filepreview-rust
spec:
  selector:
    app: filepreview-rust
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: filepreview-rust-loadbalancer
  labels:
    app: filepreview-rust
spec:
  selector:
    app: filepreview-rust
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  type: LoadBalancer

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: filepreview-rust-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: filepreview-rust
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: filepreview-rust-config
data:
  RUST_LOG: "filepreview_rust=info,tower_http=info"
  MAX_FILE_SIZE: "52428800"  # 50MB
  DEFAULT_QUALITY: "85"
  DEFAULT_WIDTH: "1024"
  DEFAULT_HEIGHT: "768"

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: filepreview-rust-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: filepreview-rust

---
# Network Policy for security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: filepreview-rust-netpol
spec:
  podSelector:
    matchLabels:
      app: filepreview-rust
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: default
    ports:
    - protocol: TCP
      port: 3000
  egress:
  - {}  # Allow all outbound traffic for downloading files

---
# ServiceMonitor for Prometheus (if using Prometheus Operator)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: filepreview-rust-metrics
  labels:
    app: filepreview-rust
spec:
  selector:
    matchLabels:
      app: filepreview-rust
  endpoints:
  - port: http
    path: /metrics
    interval: 30s